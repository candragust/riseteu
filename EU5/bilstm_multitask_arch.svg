<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="540" viewBox="0 0 1380 540">
  <defs>
    <style>
      text { font-family: Helvetica, Arial, sans-serif; font-size: 14px; fill: #1b1b1b; }
      .title { font-weight: bold; }
      .sub { font-size: 12px; fill: #444; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1b1b1b" />
    </marker>
  </defs>
  <rect x="10" y="20" width="1360" height="500" rx="12" ry="12" fill="#f9fbff" stroke="#c3d3eb" stroke-width="1.5" />
  <text x="30" y="50" class="title">BiLSTM Multi-task Forecast Head (5 outputs)</text>

  <!-- Input -->
  <rect x="40" y="190" width="150" height="120" rx="10" ry="10" fill="#e3f2fd" stroke="#4a90e2" stroke-width="1.5" />
  <text x="115" y="220" text-anchor="middle" class="title">Input Window</text>
  <text x="115" y="245" text-anchor="middle">12 candles x 4 OHLC</text>
  <text x="115" y="270" text-anchor="middle">Tensor (batch,12,4)</text>

  <!-- Preprocess -->
  <rect x="220" y="190" width="170" height="120" rx="10" ry="10" fill="#fff4e5" stroke="#f5a623" stroke-width="1.5" />
  <text x="305" y="220" text-anchor="middle" class="title">Windowing &amp; Scaling</text>
  <text x="305" y="245" text-anchor="middle">MinMax + ATR context</text>
  <text x="305" y="270" text-anchor="middle">Seeded sample builder</text>

  <!-- BiLSTM cluster -->
  <rect x="420" y="90" width="260" height="320" rx="14" ry="14" fill="#edf0ff" stroke="#5a7ea4" stroke-width="1.5" />
  <text x="550" y="120" text-anchor="middle" class="title">Shared Representation</text>
  <text x="550" y="140" text-anchor="middle">Bidirectional LSTM (forward + backward)</text>

  <rect x="450" y="170" width="200" height="70" rx="10" ry="10" fill="#ffffff" stroke="#5a7ea4" stroke-width="1" />
  <text x="550" y="195" text-anchor="middle" class="title">Forward LSTM</text>
  <text x="550" y="215" text-anchor="middle" class="sub">256 units → 4 gates (i,f,o,g)</text>
  <g fill="#8ab4f8">
    <circle cx="490" cy="235" r="10" />
    <circle cx="520" cy="235" r="10" />
    <circle cx="550" cy="235" r="10" />
    <circle cx="580" cy="235" r="10" />
  </g>
  <g font-size="12" fill="#fff" font-weight="bold">
    <text x="490" y="239" text-anchor="middle">i</text>
    <text x="520" y="239" text-anchor="middle">f</text>
    <text x="550" y="239" text-anchor="middle">o</text>
    <text x="580" y="239" text-anchor="middle">g</text>
  </g>

  <rect x="450" y="260" width="200" height="70" rx="10" ry="10" fill="#ffffff" stroke="#5a7ea4" stroke-width="1" />
  <text x="550" y="285" text-anchor="middle" class="title">Backward LSTM</text>
  <text x="550" y="305" text-anchor="middle" class="sub">256 units ← same 4 gates</text>
  <g fill="#8ab4f8">
    <circle cx="490" cy="325" r="10" />
    <circle cx="520" cy="325" r="10" />
    <circle cx="550" cy="325" r="10" />
    <circle cx="580" cy="325" r="10" />
  </g>
  <g font-size="12" fill="#fff" font-weight="bold">
    <text x="490" y="329" text-anchor="middle">i</text>
    <text x="520" y="329" text-anchor="middle">f</text>
    <text x="550" y="329" text-anchor="middle">o</text>
    <text x="580" y="329" text-anchor="middle">g</text>
  </g>

  <rect x="450" y="350" width="200" height="50" rx="10" ry="10" fill="#ffffff" stroke="#5a7ea4" stroke-width="1" />
  <text x="550" y="378" text-anchor="middle" class="title">Concat (512) + Dropout</text>

  <!-- Shared dense -->
  <rect x="720" y="200" width="190" height="100" rx="12" ry="12" fill="#f4f9e8" stroke="#7cb342" stroke-width="1.5" />
  <text x="815" y="225" text-anchor="middle" class="title">Shared Dense</text>
  <text x="815" y="250" text-anchor="middle">Dense(256) + relu</text>
  <text x="815" y="273" text-anchor="middle" class="sub">features for both heads</text>

  <!-- Price head -->
  <rect x="950" y="110" width="200" height="120" rx="12" ry="12" fill="#fff" stroke="#8c6bb1" stroke-width="1.5" />
  <text x="1050" y="140" text-anchor="middle" class="title">Price Head</text>
  <text x="1050" y="165" text-anchor="middle">Dense(4) linear</text>
  <text x="1050" y="185" text-anchor="middle">pred_open, pred_high,</text>
  <text x="1050" y="205" text-anchor="middle">pred_low, pred_close</text>

  <!-- Direction head -->
  <rect x="950" y="260" width="200" height="120" rx="12" ry="12" fill="#fff" stroke="#8c6bb1" stroke-width="1.5" />
  <text x="1050" y="290" text-anchor="middle" class="title">Direction Head</text>
  <text x="1050" y="315" text-anchor="middle">Dense(1) + sigmoid</text>
  <text x="1050" y="335" text-anchor="middle">P(bullish)</text>

  <!-- Loss boxes -->
  <rect x="1185" y="110" width="160" height="90" rx="12" ry="12" fill="#fff" stroke="#d32f2f" stroke-width="1.5" />
  <text x="1265" y="140" text-anchor="middle" class="title">Forex Loss (FLF)</text>
  <text x="1265" y="165" text-anchor="middle">lambda=1.0</text>
  <text x="1265" y="185" text-anchor="middle">sigma=0.05</text>

  <rect x="1185" y="250" width="160" height="90" rx="12" ry="12" fill="#fff" stroke="#d32f2f" stroke-width="1.5" />
  <text x="1265" y="280" text-anchor="middle" class="title">Directional Loss</text>
  <text x="1265" y="305" text-anchor="middle">Binary cross-entropy</text>

  <rect x="1185" y="370" width="160" height="110" rx="12" ry="12" fill="#ffeef0" stroke="#d32f2f" stroke-width="1.5" />
  <text x="1265" y="400" text-anchor="middle" class="title">Total Loss</text>
  <text x="1265" y="425" text-anchor="middle">FLF + alpha*BCE</text>
  <text x="1265" y="445" text-anchor="middle">Joint backprop</text>

  <!-- Arrows -->
  <g stroke="#1b1b1b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="190" y1="250" x2="220" y2="250" />
    <line x1="390" y1="250" x2="420" y2="220" />
    <line x1="390" y1="250" x2="420" y2="280" />
    <line x1="390" y1="250" x2="420" y2="360" />
    <line x1="650" y1="375" x2="720" y2="250" />
    <line x1="910" y1="250" x2="950" y2="170" />
    <line x1="910" y1="250" x2="950" y2="320" />
    <line x1="1150" y1="170" x2="1185" y2="155" />
    <line x1="1150" y1="310" x2="1185" y2="295" />
    <line x1="1265" y1="200" x2="1265" y2="370" />
    <line x1="1265" y1="340" x2="1265" y2="370" />
  </g>
</svg>