<svg xmlns='http://www.w3.org/2000/svg' width='780' height='240' font-family='Arial' font-size='14'>
  <defs>
    <marker id='arrow' markerWidth='10' markerHeight='10' refX='5' refY='3' orient='auto' markerUnits='strokeWidth'>
      <path d='M0,0 L0,6 L9,3 z' fill='#555' />
    </marker>
  </defs>
  <rect x='30' y='80' width='130' height='60' rx='8' ry='8' fill='#e6f2ff' stroke='#2b6cb0' stroke-width='2' />
  <text x='95' y='105' text-anchor='middle' font-weight='bold'>Input</text>
  <text x='95' y='125' text-anchor='middle'>shape (16, 4)</text>
  <line x1='160' y1='110' x2='210' y2='110' stroke='#555' stroke-width='2' marker-end='url(#arrow)'/>
  <rect x='210' y='60' width='180' height='100' rx='8' ry='8' fill='#e8f5e9' stroke='#2f855a' stroke-width='2' />
  <text x='300' y='90' text-anchor='middle' font-weight='bold'>BiLSTM</text>
  <text x='300' y='110' text-anchor='middle'>256 fwd + 256 bwd</text>
