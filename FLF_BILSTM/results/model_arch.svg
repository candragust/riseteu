  <text x='300' y='150' text-anchor='middle'>recurrent: sigmoid</text>
  <line x1='390' y1='110' x2='450' y2='110' stroke='#555' stroke-width='2' marker-end='url(#arrow)'/>
  <rect x='450' y='80' width='120' height='60' rx='8' ry='8' fill='#fff7e6' stroke='#c05621' stroke-width='2' />
  <text x='510' y='110' text-anchor='middle' font-weight='bold'>Dense</text>
  <text x='510' y='130' text-anchor='middle'>4 outputs (linear)</text>
  <line x1='570' y1='110' x2='650' y2='110' stroke='#555' stroke-width='2' marker-end='url(#arrow)'/>
  <rect x='650' y='80' width='90' height='60' rx='8' ry='8' fill='#f3e8ff' stroke='#6b46c1' stroke-width='2' />
  <text x='695' y='110' text-anchor='middle' font-weight='bold'>Output</text>
  <text x='695' y='130' text-anchor='middle'>OHLC</text>
  <text x='390' y='200' text-anchor='middle' font-size='12'>Loss: FLF (lambda=0.9, sigma=0.1), optimizer: Nadam lr=5e-4, batch=128</text>
