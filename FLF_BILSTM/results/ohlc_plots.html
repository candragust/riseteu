      .row { display: flex; flex-wrap: wrap; gap: 12px; }
      .card { border: 1px solid #ccc; padding: 8px; box-shadow: 1px 1px 4px #ddd; }
      img { max-width: 100%; height: auto; }

    <h1>Actual vs Predicted OHLC (validation segment)</h1>

    <div class="card">
      <h3>High</h3>
      <img src="high_actual_pred.png" alt="High actual vs pred">
    </div>
    <div class="card">

      <img src="low_actual_pred.png" alt="Low actual vs pred">

</html>
